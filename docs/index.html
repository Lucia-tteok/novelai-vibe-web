<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NovelAI Vibe Maker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <header>
      <span class="eyebrow">NOVELAI VIBE TRANSFER</span>
      <h1>参考图转 Vibe</h1>
      <p>上传图片，在浏览器中直连 NovelAI 编码，并下载兼容的 <code>.naiv4vibe</code> 文件。Token 和 Vibe库均保存在你自己的浏览器本地。</p>
    </header>

    <section class="tabs" aria-label="功能切换">
      <button id="tabMaker" class="tab active" type="button">生成 Vibe</button>
      <button id="tabLibrary" class="tab" type="button">Vibe库 <span id="libraryCount">0</span></button>
    </section>

    <section id="makerPanel">
      <form id="form" class="card">
        <label id="drop" class="drop">
          <input id="file" type="file" accept="image/png,image/jpeg,image/webp" required>
          <img id="preview" alt="图片预览">
          <div id="placeholder"><strong>选择或拖入参考图片</strong><span>PNG / JPEG / WebP，最大 10 MB</span></div>
        </label>

        <label class="token-field">NovelAI Token
          <div class="token-input">
            <input id="token" type="password" autocomplete="off" spellcheck="false" placeholder="pst-…" required>
            <button id="toggleToken" class="secondary" type="button">显示</button>
          </div>
          <label class="checkline"><input id="rememberToken" type="checkbox"><span>记住 Token 到本机浏览器，下次自动填入</span></label>
          <small>Token 只保存在当前浏览器 localStorage 中；不要在公共设备上勾选。</small>
        </label>

        <div class="grid">
          <label>模型
            <select id="model">
              <option value="nai-diffusion-4-5-full">V4.5 Full</option>
              <option value="nai-diffusion-4-5-curated">V4.5 Curated</option>
              <option value="nai-diffusion-4-full">V4 Full</option>
              <option value="nai-diffusion-4-curated-preview">V4 Curated</option>
            </select>
          </label>
          <label>参考强度 <output id="strengthValue">0.60</output><input id="strength" type="range" min="0" max="1" step="0.01" value="0.60"></label>
        </div>
        <div class="actions"><button id="submit" type="submit">生成并下载 Vibe</button><button id="saveLast" class="secondary" type="button" disabled>保存到 Vibe库</button></div>
        <p id="status" role="status"></p>
      </form>
    </section>

    <section id="libraryPanel" class="card hidden">
      <div class="library-head"><div><h2>Vibe库</h2><p>这里的数据只保存在你的浏览器本地，可导入、下载或删除。</p></div><label class="import-btn">导入 Vibe<input id="importVibe" type="file" accept=".json,.naiv4vibe,application/json" multiple></label></div>
      <div id="libraryList" class="library-list"></div>
      <p id="libraryEmpty" class="empty">暂无保存的 Vibe。生成后点击“保存到 Vibe库”，或导入已有 JSON / .naiv4vibe 文件。</p>
    </section>

    <aside class="note"><strong>说明</strong><span>编码请求中的 information_extracted 固定为 1；“参考强度”只写入下载文件的导入元数据。</span></aside>
  </main>
  <script src="app.js" type="module"></script>
</body>
</html>
