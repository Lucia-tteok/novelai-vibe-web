<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NovelAI Vibe Maker</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="shell">
    <header>
      <span class="eyebrow">NOVELAI VIBE TRANSFER</span>
      <h1>参考图转 Vibe</h1>
      <p>上传图片，由服务端调用 NovelAI 编码，并下载兼容的 <code>.naiv4vibe</code> 文件。</p>
    </header>

    <form id="form" class="card">
      <label id="drop" class="drop">
        <input id="file" type="file" accept="image/png,image/jpeg,image/webp" required>
        <img id="preview" alt="图片预览">
        <div id="placeholder">
          <strong>选择或拖入参考图片</strong>
          <span>PNG / JPEG / WebP，最大 10 MB</span>
        </div>
      </label>

      <label class="token-field">NovelAI Token
        <div class="token-input">
          <input id="token" type="password" autocomplete="off" spellcheck="false" placeholder="pst-…" required>
          <button id="toggleToken" class="secondary" type="button" aria-label="显示或隐藏 Token">显示</button>
        </div>
        <small>仅随本次生成请求通过 HTTPS 发送，服务端不保存。不要在不信任的网站输入 Token。</small>
      </label>

      <div class="grid">
        <label>模型
          <select id="model">
            <option value="nai-diffusion-4-5-full">V4.5 Full</option>
            <option value="nai-diffusion-4-5-curated">V4.5 Curated</option>
            <option value="nai-diffusion-4-full">V4 Full</option>
            <option value="nai-diffusion-4-curated-preview">V4 Curated</option>
          </select>
        </label>
        <label>参考强度 <output id="strengthValue">0.60</output>
          <input id="strength" type="range" min="0" max="1" step="0.01" value="0.60">
        </label>
      </div>

      <button id="submit" type="submit">生成并下载 Vibe</button>
      <p id="status" role="status"></p>
    </form>

    <aside class="note">
      <strong>说明</strong>
      <span>编码请求中的 information_extracted 固定为 1；“参考强度”只写入下载文件的导入元数据。</span>
    </aside>
  </main>
  <script src="/app.js" type="module"></script>
</body>
</html>
